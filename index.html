<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

  <body>
    <header>
      <div class="main-header">
        <h1>Lucas</h1>

        <button
          class="mobile-nav-toggle"
          aria-controls="main-nav"
          aria-expanded="false"

          <span class="visibility">Menu</span>

        <nav>
          <ul class="main-nav" data-visible="false">
            <li class="header__list__item">
              <a href="#" class="header__list__link">Skills</a>
            </li>
            <li class="header__list__item">
              <a href="#" class="header__list__link">Projetos</a>
            </li>
            <li class="header__list__item">

            </li>
            <li class="header__list__item">
              <a href="#" class="header__list__link">Contato</a>
            </li>
          </ul>
        </nav>
      </div>
      </div>

    <main>
      <div class="hero">
        <div class="hero__box">

          </header>
          <div>
            <ul class="skills__list">
              <li class="skills__list__item" >
                <span aria-label="html"></span>

              <li class="skills__list__item" >

              </li>
              <li class="skills__list__item" >
                <span aria-label="javascript"></span>
              </li>
            </ul>
          </div>
        </section>

        <section class="projetos">
          <header class="projetos__header">
            <h2 class="projetos__title">Projetos</h2>
          </header>
          <div>
            <ul class="projects__list">
              <li class="projects__list__item">
                <a target="_blank" href="https://7daysresponsividade.vercel.app/">Alura Responsividade
                  <img src="./assets/img/projeto01m.png" alt="">
                </a>
              </li>
              <li class="projects__list__item">
                <a target="_blank" href="https://acamposlucas.github.io/space-tourism/">Space Tourism

            </li>
            <li class="projects__list__item">

            </ul>
          </div>

    <script src="./assets/js/main.js"></script>
